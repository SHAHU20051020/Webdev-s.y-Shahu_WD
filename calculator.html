<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Advanced Calculator</title>

<style>
body {
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  background: #1e1e1e;
  font-family: Arial;
}

.calculator {
  background: #2c2c2c;
  padding: 20px;
  border-radius: 15px;
  box-shadow: 0 0 20px black;
}

#display {
  width: 100%;
  height: 60px;
  font-size: 22px;
  text-align: right;
  padding: 10px;
  margin-bottom: 15px;
  border-radius: 10px;
  border: none;
  background: black;
  color: #0f0;
}

.buttons {
  display: grid;
  grid-template-columns: repeat(5, 65px);
  gap: 10px;
}

button {
  height: 55px;
  font-size: 16px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  background: #444;
  color: white;
}

button:hover {
  background: #666;
}

.operator { background: orange; }
.equal { background: green; grid-column: span 2; }
.clear { background: red; }
.special { background: #007bff; }
</style>

</head>
<body>

<div class="calculator">
  <input type="text" id="display" readonly>

  <div class="buttons">
    <button class="clear" onclick="clearDisplay()">C</button>
    <button onclick="deleteLast()">⌫</button>
    <button class="operator" onclick="append('/')">/</button>
    <button class="operator" onclick="append('*')">*</button>
    <button class="special" onclick="square()">x²</button>

    <button onclick="append('7')">7</button>
    <button onclick="append('8')">8</button>
    <button onclick="append('9')">9</button>
    <button class="operator" onclick="append('-')">-</button>
    <button class="special" onclick="sqrt()">√</button>

    <button onclick="append('4')">4</button>
    <button onclick="append('5')">5</button>
    <button onclick="append('6')">6</button>
    <button class="operator" onclick="append('+')">+</button>
    <button class="special" onclick="sin()">sin</button>

    <button onclick="append('1')">1</button>
    <button onclick="append('2')">2</button>
    <button onclick="append('3')">3</button>
    <button class="equal" onclick="calculate()">=</button>
    <button class="special" onclick="cos()">cos</button>

    <button onclick="append('0')">0</button>
    <button onclick="append('.')">.</button>
    <button class="special" onclick="tan()">tan</button>
  </div>
</div>

<script>
let display = document.getElementById("display");

function append(value) {
  display.value += value;
}

function clearDisplay() {
  display.value = "";
}

function deleteLast() {
  display.value = display.value.slice(0, -1);
}

function calculate() {
  try {
    display.value = eval(display.value);
  } catch {
    display.value = "Error";
  }
}

function square() {
  display.value = Math.pow(display.value, 2);
}

function sqrt() {
  display.value = Math.sqrt(display.value);
}

function sin() {
  display.value = Math.sin(display.value);
}

function cos() {
  display.value = Math.cos(display.value);
}

function tan() {
  display.value = Math.tan(display.value);
}
</script>

</body>
</html>
